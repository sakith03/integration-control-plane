  componentId: String!
  artifactType: String!
  artifactName: String!
  statistics: String!
}

# Response for artifact statistics change
type ArtifactStatisticsChangeResponse {
  status: String!
  message: String!
  successCount: Int!
  failedCount: Int!
  details: [String!]!
}

# Input for artifact trigger (e.g., triggering scheduled tasks)
input ArtifactTriggerInput {
  componentId: String!
  taskName: String!
}

# Response for artifact trigger
type ArtifactTriggerResponse {
  status: String!
  message: String!
  successCount: Int!
  failedCount: Int!
  details: [String!]!
}

# ============================================
# Input Types for Queries
# ============================================

# Component Filter Input
input ComponentFilterInput {
  withSystemComponents: Boolean
  displayType: String
  status: String
  componentSubType: String
}

# Component Sort Input
input ComponentSortInput {
  field: String!
  order: String!
}

# Pagination Input
input PaginationInput {
  limit: Int
  offset: Int
  cursor: String
}

# Component Options Input
input ComponentOptionsInput {
  filter: ComponentFilterInput
  sort: ComponentSortInput
  pagination: PaginationInput
}

# ============================================
# Project Creation Eligibility Type
# ============================================
type ProjectCreationEligibility {
  isProjectCreationAllowed: Boolean!
}

# ============================================
# Project Handler Availability Type
# ============================================
type ProjectHandlerAvailability {
  handlerUnique: Boolean!
  alternateHandlerCandidate: String
}

# ============================================
# Delete Response Type
# ============================================
type DeleteResponse {
  status: String!
  details: String!
}

# ============================================
# Delete Component V2 Response Type
# ============================================
type DeleteComponentV2Response {
  status: String!
  canDelete: Boolean!
  message: String!
  encodedData: String!
}

# ============================================
# Artifact Types Type
# ============================================
type ArtifactTypes {
  availableTypes: [String!]!
  componentType: RuntimeType!
}

# ============================================
# Component Deployment Type - Deployment Information
# ============================================
type ComponentDeployment {
  environmentId: String!
  configCount: Int!
  apiId: String
  releaseId: String!
  apiRevision: ApiRevision
  build: BuildInfo!
  imageUrl: String!
  invokeUrl: String!
  versionId: String!
  deploymentStatus: String!
  deploymentStatusV2: String!
  version: String
  cron: String
  cronTimezone: String
}

# ============================================
# API Revision Type
# ============================================
type ApiRevision {
  id: String!
  displayName: String!
}

# ============================================
# Build Info Type - Build Information
# ============================================
type BuildInfo {
  buildId: String!
  deployedAt: String
  commit: CommitInfo
  sourceConfigMigrationStatus: SourceConfigMigrationStatus
  runId: String!
}

# ============================================
# Commit Info Type - Git Commit Information
# ============================================
type CommitInfo {
  author: AuthorInfo!
  sha: String!
  message: String!
  isLatest: Boolean!
}

# ============================================
# Author Info Type - Commit Author Information
# ============================================
type AuthorInfo {
  name: String!
  date: String!
  email: String!
  avatarUrl: String!
}

# ============================================
# Source Config Migration Status Type
# ============================================
type SourceConfigMigrationStatus {
  canMigrate: Boolean!
  existingFileName: String!
  existingFileSchemaVersion: String!
}

# ============================================
# ControlAction Enum - Control Actions for Artifacts
# ============================================
enum ControlAction {
  START
  STOP
}

# ============================================
# Listener Control Input - used for enabling/disabling listeners
# ============================================
input ListenerControlInput {
  runtimeIds: [String!]!
  listenerName: String!
  action: ControlAction!
}

# ============================================
# Listener Control Response
# ============================================
type ListenerControlResponse {
  success: Boolean!
  message: String!
  commandIds: [String!]!
}

# ============================================
# Update Log Level Input
# ============================================
input UpdateLogLevelInput {
  runtimeIds: [String!]!
  componentType: RuntimeType
  componentName: String
  loggerName: String
  loggerClass: String
  logLevel: LogLevel!
}

# ============================================
# Update Log Level Response
# ============================================
type UpdateLogLevelResponse {
  success: Boolean!
  message: String!
  commandIds: [String!]!
}

