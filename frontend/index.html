<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/assets/images/logo/favicon-black/favicon.ico" sizes="any" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/logo/favicon-black/favicon-32x32.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/logo/favicon-black/favicon-16x16.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" href="/assets/images/logo/favicon-white/favicon.ico" sizes="any" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/logo/favicon-white/favicon-32x32.png" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/logo/favicon-white/favicon-16x16.png" media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon" href="/assets/images/logo/favicon-black/apple-touch-icon.png" />
    <link rel="manifest" href="/assets/images/logo/favicon-black/site.webmanifest" />
    <script>
      const manifest = document.querySelector('link[rel="manifest"]');
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        manifest.href = '/assets/images/logo/favicon-white/site.webmanifest';
      }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WSO2 Integration Platform</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
